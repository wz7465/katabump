name: Katabump Auto Renew

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 2 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [external_trigger]

concurrency:
  group: renew-${{ github.event.schedule || github.event_name }}
  cancel-in-progress: false
  
permissions:
  actions: read

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # ✅ Step 1: 找上一次 run
    - name: Get previous run id
      id: get_run
      run: |
        echo "Searching for latest valid state artifact..."

        RUN_ID=$(curl -s \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/${{ github.repository }}/actions/artifacts?per_page=50" \
          | jq -r '
            .artifacts[]
            | select(.expired == false)
            | select(.size_in_bytes > 0)
            | select(.name | startswith("state-"))
            | select(.workflow_run.id != '${{ github.run_id }}')
            | .workflow_run.id
          ' \
          | head -n 1)

        echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

    # ✅ Step 2: Restore state （推荐替换为这个）
    - name: Restore state
      if: steps.get_run.outputs.run_id != ''
      uses: dawidd6/action-download-artifact@v9
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        run_id: ${{ steps.get_run.outputs.run_id }}
        name: state-*
        name_is_regexp: true
        path: .                    # 解压到当前目录
        merge_multiple: true       # 如果有多个 artifact，合并到同一目录
        skip_unpack: false       # 默认就是 false（会解压）
            
    # ✅ Step 3: fallback（关键）
    - name: Fallback init state
      if: steps.get_run.outputs.run_id == ''
      run: |
        echo "⚠️ No previous state found, initializing..."
        touch .katabump_last_success
        touch .katabump_need_retry

    # ✅ Debug（建议保留）
    - name: Debug state (详细版)
      run: |
        echo "=== 当前工作目录 ==="
        pwd
        echo "=== 根目录所有文件（包括隐藏）==="
        ls -la
        echo "=== 所有 .katabump 文件（递归查找）==="
        find . -name ".katabump_*" -type f
        echo "=== 检查可能的 state-* 目录 ==="
        ls -la state-*/ 2>/dev/null || echo "无 state-* 目录"

    - name: Make scripts executable
      run: chmod +x *.sh

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        npm install
        npx playwright install-deps chrome

    # === 每日执行 ===
    - name: Run daily check
      if: github.event.schedule == '0 0 * * *' || github.event_name == 'workflow_dispatch'
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        STATE: ${{ github.workspace }}/.katabump_last_success
        RETRY: ${{ github.workspace }}/.katabump_need_retry
      run: ./check_and_trigger.sh

    # === 补救执行 ===
    - name: Run retry
      if: github.event.schedule == '0 2 * * *'
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        STATE: ${{ github.workspace }}/.katabump_last_success
        RETRY: ${{ github.workspace }}/.katabump_need_retry
      run: ./retry_if_needed.sh

    # === 保存状态（artifact）===
    - name: Upload state
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: state-${{ github.run_number }}
        path: .katabump_*
        retention-days: 5
        include-hidden-files: true

    # === 上传截图（调试用）===
    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots-${{ github.run_number }}
        path: screenshots/
        if-no-files-found: warn
        retention-days: 5

    # ⏱️ 提交 time.txt 到仓库(用于解决60天无文件变化的限制)
    - name: Commit time.txt to repo
      env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
  
        current_month=$(date +'%Y-%m')
        current_time=$(date +'%Y-%m-%d %H:%M:%S')
  
        # 如果文件不存在 → 创建
        if [ ! -f time.txt ]; then
          echo "首次生成时间：$current_time" > time.txt
        else
          # 读取旧月份
          old_month=$(head -n 1 time.txt | grep -oE '[0-9]{4}-[0-9]{2}')
  
          # 如果月份没变 → 不更新
          if [ "$old_month" = "$current_month" ]; then
            echo "本月已更新过，不再更新"
            exit 0
          fi
  
          # 月份变了 → 更新
          echo "$current_time" > time.txt
        fi
  
        git add time.txt
        git commit -m "📅 月度更新时间: $current_time"
        git push origin HEAD:main
