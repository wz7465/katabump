name: Katabump Auto Renew

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 2 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [external_trigger]

concurrency:
  group: renew-${{ github.event.schedule || github.event_name }}
  cancel-in-progress: false

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # === 恢复状态文件（仓库目录内，可持久化） ===
    - name: Restore state cache
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/.katabump_last_success
          ${{ github.workspace }}/.katabump_need_retry
        key: renew-state-restore
        restore-keys: |
          renew-state-

    - name: Make scripts executable
      run: chmod +x *.sh

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        npm install
        npx playwright install-deps chrome

    # === 每日执行 ===
    - name: Run daily check
      if: github.event.schedule == '0 0 * * *' || github.event_name == 'workflow_dispatch'
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        STATE: ${{ github.workspace }}/.katabump_last_success
        RETRY: ${{ github.workspace }}/.katabump_need_retry
      run: ./check_and_trigger.sh

    # === 补救执行 ===
    - name: Run retry
      if: github.event.schedule == '0 2 * * *'
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        STATE: ${{ github.workspace }}/.katabump_last_success
        RETRY: ${{ github.workspace }}/.katabump_need_retry
      run: ./retry_if_needed.sh

    # === 保存状态文件（仓库目录内，可持久化） ===
    - name: Save state cache
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/.katabump_last_success
          ${{ github.workspace }}/.katabump_need_retry
        key: renew-state-${{ github.run_id }}

    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: screenshots/
