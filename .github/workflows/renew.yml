name: Katabump Auto Renew

#on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 */4 * * *'
  workflow_dispatch:

concurrency:
  group: renew-lock
  cancel-in-progress: false

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Restore state cache
      uses: actions/cache@v4
      with:
        path: |
          .last_success
          .need_retry
        key: renew-state-restore
        restore-keys: |
          renew-state-

    - name: Make scripts executable
      run: chmod +x *.sh

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        npm install
        npx playwright install-deps chrome

    # 这里用 YAML 判断，而不是脚本判断
    - name: Run daily check
      if: github.event.schedule == '0 0 * * *' || github.event_name == 'workflow_dispatch'
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: ./check_and_trigger.sh

    - name: Run retry
      if: github.event.schedule == '0 */4 * * *'
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: ./retry_if_needed.sh

    - name: Save state cache
      uses: actions/cache@v4
      with:
        path: |
          .last_success
          .need_retry
        key: renew-state-${{ github.run_id }}

    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: screenshots/
