name: Katabump Auto Renew

on:
  schedule:
    - cron: '0 0 * * *'      # 每天 00:00 执行（主任务）
    - cron: '0 */4 * * *'    # 每 4 小时执行一次（retry）
  workflow_dispatch:

concurrency:
  group: renew-lock
  cancel-in-progress: false

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Restore state cache
      uses: actions/cache@v4
      with:
        path: |
          .last_success
          .need_retry
        key: renew-state-restore
        restore-keys: |
          renew-state-

    - name: Make scripts executable
      run: chmod +x *.sh

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        npm install
        npx playwright install-deps chrome

    # ==================== 新增：安装 Google Chrome（关键修复）====================
    - name: Install Google Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y wget gnupg
        wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /etc/apt/keyrings/google-chrome.gpg
        echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
    # =============================================================================

    # 每天主任务（00:00 或手动触发）
    - name: Run daily check
      if: github.event.schedule == '0 0 * * *' || github.event_name == 'workflow_dispatch'
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: ./check_and_trigger.sh

    # 每4小时 retry 任务
    - name: Run retry
      if: github.event.schedule == '0 */4 * * *'
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: ./retry_if_needed.sh

    - name: Save state cache
      uses: actions/cache@v4
      with:
        path: |
          .last_success
          .need_retry
        key: renew-state-${{ github.run_id }}

    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: screenshots/
